<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zeitleiste – Buchnotizen</title>

  <!-- vis-timeline (CDN) -->
  <link rel="stylesheet" href="https://unpkg.com/vis-timeline@7.7.3/styles/vis-timeline-graph2d.min.css" />
  <script src="https://unpkg.com/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.js"></script>

  <link rel="stylesheet" href="css/styles.css?v=19" />
</head>
<body>
  <header class="toolbar">
    <div class="brand">
      <span class="brand-mark">◷</span>
      <span class="brand-text">Zeitleiste<small>Buchnotizen</small></span>
    </div>

    <div class="toolbar-group">
      <button id="btn-add-item" class="btn btn-primary" title="Neuer Eintrag">＋ Eintrag</button>
      <button id="btn-link-mode" class="btn" title="Verknüpfungsmodus">🔗 Verknüpfen</button>
      <button id="btn-connections" class="btn active" title="Verbindungen ein-/ausblenden">↔ Verbindungen</button>
      <button id="btn-collapse" class="btn" title="Alle Ereignisse ein-/ausklappen">⊟ Einklappen</button>
      <button id="btn-shading" class="btn active" title="Schattierung der Welt-Ereignisse ein/aus">▒ Schattierung</button>
    </div>

    <div class="toolbar-group toolbar-right">
      <button id="btn-categories" class="btn" title="Kategorien verwalten">🎨 Kategorien</button>
      <button id="btn-sources" class="btn" title="Quellen verwalten">📖 Quellen</button>
      <button id="btn-fit" class="btn" title="Alles einpassen">⤢ Einpassen</button>
      <button id="btn-export" class="btn" title="Als JSON sichern">⬇ Export</button>
      <button id="btn-import" class="btn" title="JSON laden">⬆ Import</button>
      <button id="btn-help" class="btn" title="Hilfe &amp; Tastenkürzel">?</button>
      <input id="import-file" type="file" accept="application/json" hidden />
    </div>
  </header>

  <!-- Filter-/Legendenleiste -->
  <div id="filter-bar" class="filter-bar"></div>

  <!-- Hinweisleiste (z. B. Verknüpfungsmodus) -->
  <div id="hint-bar" class="hint-bar" hidden></div>

  <main class="layout">
    <section class="timeline-wrap">
      <div id="timeline"></div>
      <!-- SVG-Overlay für Verbindungen wird hier per JS eingehängt -->
    </section>

    <aside id="detail-panel" class="detail-panel">
      <div class="detail-empty">
        <p>Klicke einen Eintrag an, um Details zu sehen.</p>
        <p class="muted">Doppelklick auf eine freie Stelle legt ein neues Ereignis an.</p>
      </div>
    </aside>
  </main>

  <!-- Modal-Container -->
  <div id="modal-root"></div>

  <script type="module" src="js/main.js?v=19"></script>
</body>
</html>
